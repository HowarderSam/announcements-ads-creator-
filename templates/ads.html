<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <title>All ads</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div class="container my-5">
    <h1 class="mb-4 text-center">All ads</h1>

    <div class="row row-cols-1 row-cols-md-2 row-cols-lg-3 g-4">
        {% for ad in data %}
        <div class="col">
            <div class="card h-100 shadow-sm">
                <div class="card-body">

                    <h5 class="card-title">{{ ad[1] }}</h5>

                    <p class="card-text">{{ ad[2] }}</p>

                    <h6 class="card-subtitle mb-2 text-muted">Phone number: {{ ad[3] }} | Email: {{ ad[4] }}</h6>

                    <a href="{{ url_for('create_ad') }}" class="card-link">Create new</a>
                </div>
            </div>
        </div>
        {% endfor %}
    </div>
</div>


</body>
</html>
