<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Create Ad</title>
</head>
<body>

    <h2>Create a New Ad</h2>

    <form method="POST">
        <label>Enter Title:</label>
        <input type="text" name="title" placeholder="Ad title" required><br/>

        <label>Enter Text:</label>
        <input type="text" name="text" placeholder="Ad description" required><br/>

        <label>Enter Phone Number:</label>
        <input type="text" name="phone" placeholder="Your phone number" required><br/>

        <label>Enter Email:</label>
        <input type="email" name="email" placeholder="Your email" required><br/>

        <input type="submit" value="Submit"/><br/>
    </form>

    <br/>
    <a href="{{ url_for('show_ads') }}">View All Ads</a>

</body>
</html>
